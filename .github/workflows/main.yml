name: Build STT Offline APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Download sherpa-onnx Android artifacts
      run: |
        mkdir -p app/libs
        mkdir -p app/src/main/assets

        curl -L \
          "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.12.20/sherpa-onnx-1.12.20.aar" \
          -o app/libs/sherpa-onnx-1.12.20.aar

        curl -L \
          "https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/silero_vad.onnx" \
          -o app/src/main/assets/silero_vad.onnx

        ls -lh app/libs
        ls -lh app/src/main/assets/silero_vad.onnx

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    - name: Generate Gradle wrapper JAR
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar.note
        gradle wrapper --gradle-version 8.2

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: STTOffline-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
